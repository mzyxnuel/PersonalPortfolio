<section class="pt-10 mt-10 sm:mt-24 lg:pt-32 mp:pt-10 xl:pt-32 2xl:pt-32">
  <div class="container mx-auto px-8 lg:flex">
    <div class="text-center lg:text-left lg:w-1/2">
      <h1
        class="animate__animated animate__fadeInLeft text-4xl lg:text-5xl xl:text-6xl font-bold leading-none text-white lg:pt-20"
      >
        Hi, I'm {{ name }} 
      </h1>
      <p
        class="animate__animated animate__fadeInLeft md:text-xl lg:text-2xl mt-6 font-light text-gray-300"
      >
        {{ description }}
      </p>
      <a
        [href]="'assets/documents/' + cv_file"
        [download]="cv_file"
        class="animate__animated animate__fadeInLeft mt-10 inline-flex items-center justify-center px-5 py-3 mr-3 text-base font-medium text-center text-white rounded-lg bg-teal-700 hover:bg-teal-900 focus:ring-4 focus:ring-primary-300 dark:focus:ring-primary-900"
      >
        Download CV
        <svg
          class="pl-2"
          width="30px"
          height="20px"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
          <g
            id="SVGRepo_tracerCarrier"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></g>
          <g id="SVGRepo_iconCarrier">
            <path
              d="M12 3V16M12 16L16 11.625M12 16L8 11.625"
              stroke="#c5c8d3"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
            <path
              d="M15 21H9C6.17157 21 4.75736 21 3.87868 20.1213C3 19.2426 3 17.8284 3 15M21 15C21 17.8284 21 19.2426 20.1213 20.1213C19.8215 20.4211 19.4594 20.6186 19 20.7487"
              stroke="#c5c8d3"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
          </g>
        </svg>
      </a>
      <a
        [href]="'mailto:' + email" target="_blank"
        class="animate__animated animate__fadeInLeft text-white mt-3 sm:relative sm:top-1 inline-flex items-center justify-center px-5 py-3 text-base font-medium text-center border  rounded-lg dark:text-white dark:border-gray-700 dark:hover:bg-gray-700 dark:focus:ring-gray-800"
      >
        <svg
          class="pr-2"
          width="30px"
          height="20px"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
          <g
            id="SVGRepo_tracerCarrier"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></g>
          <g id="SVGRepo_iconCarrier">
            <path
              d="M4 7.00005L10.2 11.65C11.2667 12.45 12.7333 12.45 13.8 11.65L20 7"
              stroke="#c5c8d3"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
            <rect
              x="3"
              y="5"
              width="18"
              height="14"
              rx="2"
              stroke="#c5c8d3"
              stroke-width="2"
              stroke-linecap="round"
            ></rect>
          </g>
        </svg>
        {{ email }}
      </a>
    </div>
    <div class="lg:w-1/2">
      <app-illustration></app-illustration>
    </div>
  </div>
</section>
