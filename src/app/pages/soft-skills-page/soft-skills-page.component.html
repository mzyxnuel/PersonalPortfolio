<section class="mt-20 bg-gray-900 text-white">
  <div
    class="mx-auto max-w-screen-xl px-4 py-8 sm:py-12 sm:px-6 lg:py-16 lg:px-8"
  >
    <div class="mx-auto max-w-lg text-center">
      <h2 class="text-3xl font-bold sm:text-4xl">Soft Skills</h2>

      <p class="mt-4 text-gray-300">
        {{ softskills_description }}
      </p>
    </div>

    <div class="mt-20 grid grid-cols-1 gap-8 md:gap-20 md:grid-cols-2 lg:grid-cols-3">
      <div *ngFor="let softskill of softskills">
        <app-paragraph-template [softskill]="softskill"></app-paragraph-template>
      </div>
    </div>
  </div>
</section>
