<header>
  <nav
    class=" backdrop-blur-xl fixed top-0 mx-auto flex w-full items-center justify-between p-4 2xl:p-2 2xl:px-8 z-10"
    aria-label="Global"
  >
    <!-- LOGO -->
    <div class="flex 2xl:flex-1 pl-64 mr-10">
      <a class="-m-1.5 p-1.5 hidden 2xl:block">
        <img [src]="logo" class="w-8 h-8" />
      </a>
    </div>

    <!-- MOBILE BUTTON -->
    <div class="flex 2xl:hidden z-50 w-7 h-7 ml-auto pr-12">
      <button
        type="button"
        id="showBtn"
        class="w-15 h-15 inline-flex items-center rounded-md p-2.5 text-gray-700"
        (click)="showMobileHeader()"
      >
        <span class="sr-only">Open main menu</span>
        <svg
          class="h-10 w-10"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="#9c9c9c"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
          />
        </svg>
      </button>
    </div>

    <div *ngFor="let page of pages" class="text-white">
      <ng-container *ngIf="page.id != 'hard-skills'; else DropDown">
        <a
          [routerLink]="page.id"
          (click)="toggleIfIsActive();scrollOnTop()"
          class="text-sm leading-6 mr-20 hidden 2xl:block text-gray-300 px-4 py-2 rounded-md font-bold transform hover:translate-x-1 duration-500"
          [routerLinkActive]="'bg-teal-600/10'"
        >
          {{ page.title }}
        </a>
      </ng-container>

      <ng-template #DropDown>
        <div class="relative pr-20 hidden 2xl:block">
          <div
            class="inline-flex items-center overflow-hidden rounded-md backdrop-blur-xl cursor-pointer  "
            (click)="toggleDropdown()"
          >
            <span
              class="border-e px-4 py-2 text-sm/none text-gray-600 dark:border-e-gray-800 dark:text-gray-300 font-bold"
            >
              {{ page.title }}
            </span>

            <button
              class="h-full p-2 text-gray-600 dark:text-gray-300"
            >
              <span class="sr-only">Menu</span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                viewBox="0 0 20 20"
                fill="currentColor"
              >
                <path
                  fill-rule="evenodd"
                  d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                  clip-rule="evenodd"
                />
              </svg>
            </button>
          </div>

          <div
            class="absolute end-0 z-10 mt-2 w-56 rounded-md border border-gray-100 bg-white shadow-lg dark:border-gray-800 dark:bg-gray-800"
            [hidden]="isHidden"
          >
            <div class="p-2">
              <ng-container *ngFor="let subpage of page.children">
                <button
                  class="flex w-full items-center gap-2 rounded-lg px-4 py-2 text-sm dark:text-gray-400 dark:hover:bg-teal-600/10 font-bold "
                  [routerLink]="subpage.id"
                  [routerLinkActive]="'bg-teal-600/10'"
                  (click)="toggleDropdown();scrollOnTop()"
                >
                  <img [src]="subpage.svg" height="20" width="20" />
                  <span class="transform hover:translate-x-1 duration-500">{{ subpage.title }}</span> 
                </button>
              </ng-container>
            </div>
          </div>
        </div>
      </ng-template>
    </div>

    <div class="hidden 2xl:flex 2xl:flex-1 2xl:justify-end pr-64">
      <div *ngFor="let social of socials">
        <a [href]="social.link" target="_blank">
          <img
            class="filter invert p-1"
            height="35px"
            width="35px"
            [src]="social.svg"
          />
        </a>
      </div>
    </div>
  </nav>
  <app-mobile-header></app-mobile-header>
</header>
